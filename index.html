<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
</head>

<body style="margin:0; font-family:Arial; text-align:center; background:linear-gradient(135deg,#ffc0cb,#d8b4fe); display:flex; justify-content:center; align-items:center; height:100vh;">

<div id="box" style="background:white; padding:20px; border-radius:15px; max-width:300px;">
<h2>Hi Ayushi ❤️</h2>
<p>Tap below...</p>
<button onclick="nextStep()" style="padding:10px 20px;">Start</button>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
let step = 0;

function nextStep(){
  let box = document.getElementById("box");
  let music = document.getElementById("music");

  // play music after user interaction (important for mobile)
  if(step === 0){
    music.play().catch(() => {});
  }

  step++;

  if(step === 1){
    box.innerHTML = `
      <h3>We haven’t met yet…</h3>
      <p>But something about you feels right.</p>
      <button onclick="nextStep()">Next</button>
    `;
  }
  else if(step === 2){
    box.innerHTML = `
      <h3>Strange, right?</h3>
      <p>Still… I feel connected to you.</p>
      <button onclick="nextStep()">Next</button>
    `;
  }
  else if(step === 3){
    box.innerHTML = `
      <h3>I believe</h3>
      <p>Some stories are written before we meet.</p>
      <button onclick="nextStep()">Next</button>
    `;
  }
  else if(step === 4){
    box.innerHTML = `
      <h1 style="color:red;">Will you marry me? 💍</h1>
      <button onclick="alert('I knew it ❤️')">Yes</button>
    `;
  }
}
</script>

</body>
</html>
