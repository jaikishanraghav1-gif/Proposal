<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Inter', sans-serif;
  background:#0b0b0b;
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 8%;
}

nav h2 {color:#00ffd1;}

nav a {
  margin-left:20px;
  color:white;
  text-decoration:none;
}

.hero {
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:55px;
}

.hero span {color:#00ffd1;}

.typing {
  margin-top:10px;
  color:#aaa;
}

section {
  padding:80px 8%;
}

.title {
  color:#00ffd1;
  font-size:28px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:#141414;
  padding:20px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

footer {
  text-align:center;
  padding:20px;
  color:#777;
}
</style>
</head>

<body>

<nav>
  <h2>YourName</h2>
  <div>
    <a href="#about">About</a>
    <a href="#work">Work</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Hi, I'm <span>Your Name</span></h1>
  <div class="typing" id="typing"></div>
</div>

<section id="about">
  <div class="title">About Me</div>
  <p>
    Write your introduction here. Replace this text with your experience, skills, and background.
  </p>
</section>

<section id="work">
  <div class="title">Projects</div>
  <div class="grid">
    <div class="card">Project Title 1</div>
    <div class="card">Project Title 2</div>
    <div class="card">Project Title 3</div>
  </div>
</section>

<section id="contact">
  <div class="title">Contact</div>
  <p>Email: your@email.com</p>
</section>

<footer>
  © 2026 Your Name
</footer>

<script>
const roles = ["Developer", "Designer", "Freelancer"];
let i=0,j=0,current="",del=false;

function type(){
  current=roles[i];
  document.getElementById("typing").innerText=current.substring(0,j);

  if(!del && j<current.length){
    j++; setTimeout(type,100);
  } else if(del && j>0){
    j--; setTimeout(type,50);
  } else {
    del=!del;
    if(!del) i=(i+1)%roles.length;
    setTimeout(type,1000);
  }
}
type();
</script>

</body>
</html>
