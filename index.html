<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal ❤️</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#ffc0cb,#d8b4fe);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  #box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    max-width: 350px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    position: relative;
    z-index: 10;
  }

  button {
    padding: 10px 20px;
    margin-top: 15px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background-color: #ff4d6d;
    color: white;
    position: relative;
  }

  /* Typing effect */
  .typing {
    border-right: .15em solid #ff4d6d;
    white-space: nowrap;
    overflow: hidden;
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    width: 25px;
    height: 25px;
    background: red;
    transform: rotate(-45deg);
    left: 50%;
    animation: floatUp 5s linear infinite;
  }
  .heart:before,
  .heart:after {
    content: '';
    position: absolute;
    width: 25px;
    height: 25px;
    background: red;
    border-radius: 50%;
  }
  .heart:before {
    top: -12px;
    left: 0;
  }
  .heart:after {
    left: 12px;
    top: 0;
  }
  @keyframes floatUp {
    0% {transform: translateX(0) translateY(0) rotate(-45deg); opacity:1;}
    100% {transform: translateX(-50px) translateY(-600px) rotate(-45deg); opacity:0;}
  }
</style>
</head>
<body>

<div id="box">
  <h2 id="text"></h2>
  <p id="message" class="typing"></p>
  <button id="startBtn" onclick="nextStep()">Start</button>
</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3" type="audio/mp3">
  <!-- Replace with any romantic slow tune URL -->
</audio>

<script>
let step = 0;
const messages = [
  "Hi Ayushi ❤️",
  "We haven’t met yet…",
  "But I feel something special about you.",
  "Strange, right? Still connected somehow…",
  "I believe some stories are written before we meet.",
  "I want to spend my life with you… 💖",
  "Will you marry me? 💍"
];

function typeText(element, text, speed=50, callback=null) {
  element.innerHTML = "";
  let i = 0;
  const interval = setInterval(() => {
    element.innerHTML += text.charAt(i);
    i++;
    if(i === text.length) {
      clearInterval(interval);
      if(callback) callback();
    }
  }, speed);
}

function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random()*100 + 'vw';
  heart.style.animationDuration = 3 + Math.random()*3 + 's';
  document.body.appendChild(heart);
  setTimeout(()=>document.body.removeChild(heart), 5000);
}

setInterval(createHeart, 500);

function nextStep(){
  let textEl = document.getElementById("text");
  let messageEl = document.getElementById("message");
  let box = document.getElementById("box");
  let music = document.getElementById("music");

  if(step === 0) {
    music.volume = 0.5;
    music.play().catch(()=>{});
  }

  step++;

  if(step <= messages.length-1){
    typeText(textEl, messages[step-1]);
    typeText(messageEl, "");
  } else if(step === messages.length){
    // Clear box content and show Yes/No
    box.innerHTML = `
      <h1 style="color:red;">Will you marry me? 💍</h1>
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    `;

    const yes = document.getElementById("yesBtn");
    yes.onclick = ()=>alert("I knew it! ❤️");

    const no = document.getElementById("noBtn");
    // Runaway NO button
    no.onmouseover = ()=> {
      no.style.position = 'absolute';
      no.style.top = Math.random()*60 + "%";
      no.style.left = Math.random()*70 + "%";
    };
  }
}
</script>

</body>
</html>
