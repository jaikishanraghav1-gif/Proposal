<!DOCTYPE html>
<html>
<head>
    <title>Interactive GIFs</title>
</head>
<body>
    <h1>Choose Your Response</h1>
    <button id="yes-button">Yes</button>
    <button id="no-button">No</button>
    <div id="gif-display" style="display:none;">
        <h2>GIFs</h2>
        <img id="hug-gif" src="hug.gif" alt="Hug GIF" style="display:none;" />
        <img id="kiss-gif" src="kiss.gif" alt="Kiss GIF" style="display:none;" />
    </div>

    <script>
        document.getElementById('yes-button').onclick = function() {
            document.getElementById('gif-display').style.display = 'block';
            document.getElementById('hug-gif').style.display = 'block';
            document.getElementById('kiss-gif').style.display = 'block';
            const audio = new Audio('slow-piano-music.mp3');
            audio.play();
        };
        document.getElementById('no-button').onclick = function() {
            alert('No response selected.');
        };
    </script>
</body>
</html>
